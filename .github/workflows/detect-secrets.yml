name: Detect Secrets

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: detect-secrets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for new secrets
        run: |
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files '\.enc$' \
            --exclude-files '\.sops\.yaml$' \
            --exclude-files 'node_modules/' \
            --exclude-files 'package-lock\.json$'

      - name: Summary
        if: always()
        run: |
          echo "## Detect Secrets" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Baseline findings: $(python3 -c "import json; d=json.load(open('.secrets.baseline')); print(sum(len(v) for v in d.get('results',{}).values()))")" >> "$GITHUB_STEP_SUMMARY"
