name: fugue-codex-implement

on:
  workflow_call:
    inputs:
      issue_number:
        description: "Issue number containing implementation instructions"
        required: true
        type: string
      target_repo:
        description: "Target repository (owner/repo) for code generation. Defaults to caller repo."
        required: false
        type: string
        default: ""
      implement_request:
        description: "Override implement intent detected by caller context (true|false|empty)"
        required: false
        type: string
        default: ""
      implement_confirmed:
        description: "Override implement confirmation detected by caller context (true|false|empty)"
        required: false
        type: string
        default: ""
      target_branch:
        description: "Base branch to create PR against"
        required: false
        type: string
        default: "main"
      codex_model:
        description: "Codex model to use"
        required: false
        type: string
        default: "gpt-5-codex"
      refinement_cycles:
        description: "Pre-implementation refinement cycles (Plan/Parallel Simulation/Critical Review/Fix/Replan)"
        required: false
        type: string
        default: "3"
      implementation_dialogue_rounds:
        description: "Implementation-phase collaboration rounds (Implementer/Critic/Integrator)"
        required: false
        type: string
        default: "2"
      orchestration_profile:
        description: "Resolved orchestration profile (codex-full|claude-light)"
        required: false
        type: string
        default: "codex-full"
      execution_mode:
        description: "Execution policy mode (primary|backup-safe|backup-heavy|record-only)"
        required: false
        type: string
        default: "primary"
      vote_command:
        description: "True when the implementation handoff originated from `/vote`"
        required: false
        type: string
        default: "false"
      council_force_missing_provider:
        description: "Manual verification override for kernel council baseline provider (default: none)"
        required: false
        type: string
        default: "none"
      risk_tier:
        description: "Resolved risk tier (low|medium|high)"
        required: false
        type: string
        default: ""
      lessons_required:
        description: "Whether lessons update is strictly required (true|false|auto)"
        required: false
        type: string
        default: "auto"
      correction_signal:
        description: "Whether this issue includes explicit correction/postmortem signal (true|false|auto)"
        required: false
        type: string
        default: "auto"
      workspace_hint_applied:
        description: "Whether Google Workspace readonly preflight is relevant"
        required: false
        type: string
        default: "false"
      workspace_action_hint:
        description: "Comma-separated Google Workspace action hints"
        required: false
        type: string
        default: ""
      workspace_domain_hint:
        description: "Comma-separated Google Workspace domain hints"
        required: false
        type: string
        default: ""
      workspace_reason:
        description: "Short explanation for Google Workspace relevance"
        required: false
        type: string
        default: ""
      workspace_suggested_phases:
        description: "Comma-separated Kernel phases suggested for Workspace use"
        required: false
        type: string
        default: ""
      workspace_readonly_actions:
        description: "Comma-separated readonly Google Workspace actions allowed in CI preflight"
        required: false
        type: string
        default: ""
      workspace_approval_required_actions:
        description: "Comma-separated write Google Workspace actions requiring approval"
        required: false
        type: string
        default: ""
      workspace_readonly_environment:
        description: "Protected GitHub Environment used for readonly Google Workspace CI preflight"
        required: false
        type: string
        default: "workspace-readonly"
      freee_hint_applied:
        description: "Whether freee readonly preflight is relevant"
        required: false
        type: string
        default: "false"
      freee_action_hint:
        description: "Comma-separated freee action hints"
        required: false
        type: string
        default: ""
      freee_domain_hint:
        description: "Comma-separated freee domain hints"
        required: false
        type: string
        default: ""
      freee_reason:
        description: "Short explanation for freee relevance"
        required: false
        type: string
        default: ""
      freee_suggested_phases:
        description: "Comma-separated Kernel phases suggested for freee use"
        required: false
        type: string
        default: ""
      freee_readonly_actions:
        description: "Comma-separated readonly freee actions allowed in CI preflight"
        required: false
        type: string
        default: ""
      freee_approval_required_actions:
        description: "Comma-separated freee actions requiring approval"
        required: false
        type: string
        default: ""
      freee_readonly_environment:
        description: "Protected GitHub Environment used for readonly freee CI preflight"
        required: false
        type: string
        default: ""
      content_hint_applied:
        description: "Whether content-specific routing hints were applied"
        required: false
        type: string
        default: "false"
      content_action_hint:
        description: "Comma-separated content action hints"
        required: false
        type: string
        default: ""
      content_skill_hint:
        description: "Comma-separated content skill hints"
        required: false
        type: string
        default: ""
      content_reason:
        description: "Short explanation for content-route relevance"
        required: false
        type: string
        default: ""
      content_primary_action_hint:
        description: "Primary content action hint"
        required: false
        type: string
        default: ""
      content_primary_skill_hint:
        description: "Primary content skill hint"
        required: false
        type: string
        default: ""
      content_support_action_hint:
        description: "Support content action hint"
        required: false
        type: string
        default: ""
      content_support_skill_hint:
        description: "Support content skill hint"
        required: false
        type: string
        default: ""
      compare_mode:
        description: "Outline compare mode flag"
        required: false
        type: string
        default: "off"
      compare_required_artifacts:
        description: "Artifacts required when compare mode is active"
        required: false
        type: string
        default: ""
    secrets:
      ZAI_API_KEY:
        required: false
      GEMINI_API_KEY:
        required: false
      XAI_API_KEY:
        required: false
      COPILOT_GITHUB_TOKEN:
        required: false
      FUGUE_COPILOT_TOKEN:
        required: false
      TARGET_REPO_PAT:
        required: false
      GOOGLE_WORKSPACE_CLI_CREDENTIALS_JSON:
        required: false
      FREEE_ACCESS_TOKEN:
        required: false
      FREEE_REFRESH_TOKEN:
        required: false
      FREEE_CLIENT_ID:
        required: false
      FREEE_CLIENT_SECRET:
        required: false
      FREEE_COMPANY_ID:
        required: false

permissions:
  issues: write
  contents: write
  pull-requests: write

concurrency:
  group: fugue-codex-impl-${{ github.repository }}-${{ inputs.issue_number }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_run: ${{ steps.ctx.outputs.should_run }}
      skip_reason: ${{ steps.ctx.outputs.skip_reason }}
      issue_number: ${{ steps.ctx.outputs.issue_number }}
      issue_title: ${{ steps.ctx.outputs.issue_title }}
      issue_body: ${{ steps.ctx.outputs.issue_body }}
      is_large_refactor: ${{ steps.ctx.outputs.is_large_refactor }}
      target_repo: ${{ steps.ctx.outputs.target_repo }}
      branch_name: ${{ steps.ctx.outputs.branch_name }}
      risk_tier: ${{ steps.ctx.outputs.risk_tier }}
      risk_score: ${{ steps.ctx.outputs.risk_score }}
      risk_reasons: ${{ steps.ctx.outputs.risk_reasons }}
      lessons_required: ${{ steps.ctx.outputs.lessons_required }}
      correction_signal: ${{ steps.ctx.outputs.correction_signal }}
      preflight_cycles_floor: ${{ steps.ctx.outputs.preflight_cycles_floor }}
      implementation_dialogue_rounds_floor: ${{ steps.ctx.outputs.implementation_dialogue_rounds_floor }}
      context_budget_initial: ${{ steps.ctx.outputs.context_budget_initial }}
      context_budget_max: ${{ steps.ctx.outputs.context_budget_max }}
      context_budget_floor_initial: ${{ steps.ctx.outputs.context_budget_floor_initial }}
      context_budget_floor_max: ${{ steps.ctx.outputs.context_budget_floor_max }}
      context_budget_floor_span: ${{ steps.ctx.outputs.context_budget_floor_span }}
      context_budget_guard_applied: ${{ steps.ctx.outputs.context_budget_guard_applied }}
      context_budget_guard_reasons: ${{ steps.ctx.outputs.context_budget_guard_reasons }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve issue context
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          ORCHESTRATION_PROFILE: ${{ inputs.orchestration_profile }}
          INPUT_RISK_TIER: ${{ inputs.risk_tier }}
          INPUT_LESSONS_REQUIRED: ${{ inputs.lessons_required }}
          INPUT_CORRECTION_SIGNAL: ${{ inputs.correction_signal }}
          FUGUE_CONTEXT_BUDGET_MIN_INITIAL: ${{ vars.FUGUE_CONTEXT_BUDGET_MIN_INITIAL || '6' }}
          FUGUE_CONTEXT_BUDGET_MIN_MAX: ${{ vars.FUGUE_CONTEXT_BUDGET_MIN_MAX || '12' }}
          FUGUE_CONTEXT_BUDGET_MIN_SPAN: ${{ vars.FUGUE_CONTEXT_BUDGET_MIN_SPAN || '6' }}
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ inputs.issue_number }}"
          issue_json="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}")"

          TITLE="$(echo "${issue_json}" | jq -r '.title // ""')"
          BODY="$(echo "${issue_json}" | jq -r '.body // ""')"
          HAS_IMPLEMENT="$(echo "${issue_json}" | jq -r '[.labels[].name] | (index("implement") != null) or (index("codex-implement") != null) or (index("claude-implement") != null)')"
          HAS_IMPLEMENT_CONFIRMED="$(echo "${issue_json}" | jq -r '[.labels[].name] | (index("implement-confirmed") != null)')"
          HAS_LARGE_REFACTOR="$(echo "${issue_json}" | jq -r '[.labels[].name] | (index("large-refactor") != null)')"
          LABELS_CSV="$(echo "${issue_json}" | jq -r '[.labels[]?.name] | join(",")')"

          INPUT_IMPLEMENT_REQUEST="$(echo "${{ inputs.implement_request }}" | tr '[:upper:]' '[:lower:]' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          if [[ "${INPUT_IMPLEMENT_REQUEST}" != "true" && "${INPUT_IMPLEMENT_REQUEST}" != "false" ]]; then
            INPUT_IMPLEMENT_REQUEST=""
          fi
          if [[ -n "${INPUT_IMPLEMENT_REQUEST}" ]]; then
            HAS_IMPLEMENT="${INPUT_IMPLEMENT_REQUEST}"
          fi

          INPUT_IMPLEMENT_CONFIRMED="$(echo "${{ inputs.implement_confirmed }}" | tr '[:upper:]' '[:lower:]' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          if [[ "${INPUT_IMPLEMENT_CONFIRMED}" != "true" && "${INPUT_IMPLEMENT_CONFIRMED}" != "false" ]]; then
            INPUT_IMPLEMENT_CONFIRMED=""
          fi
          if [[ -n "${INPUT_IMPLEMENT_CONFIRMED}" ]]; then
            HAS_IMPLEMENT_CONFIRMED="${INPUT_IMPLEMENT_CONFIRMED}"
          fi

          SHOULD_RUN="true"
          SKIP_REASON=""
          if [[ "${HAS_IMPLEMENT}" != "true" ]]; then
            SHOULD_RUN="false"
            SKIP_REASON="missing-implement-intent"
          elif [[ "${HAS_IMPLEMENT_CONFIRMED}" != "true" ]]; then
            SHOULD_RUN="false"
            SKIP_REASON="missing-implement-confirmed"
          fi

          # Determine target repo
          TARGET_REPO="${{ inputs.target_repo }}"
          if [[ -z "${TARGET_REPO}" ]]; then
            TARGET_REPO="${GITHUB_REPOSITORY}"
          fi

          # Generate branch name from issue number
          SAFE_TITLE="$(echo "${TITLE}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | head -c 40)"
          BRANCH_NAME="codex/issue-${ISSUE_NUMBER}-${SAFE_TITLE}"

          eval "$(
            scripts/lib/workflow-risk-policy.sh \
              --title "${TITLE}" \
              --body "${BODY}" \
              --labels "${LABELS_CSV}" \
              --has-implement "${HAS_IMPLEMENT}" \
              --orchestration-profile "${ORCHESTRATION_PROFILE}"
          )"
          if [[ "${INPUT_RISK_TIER}" == "low" || "${INPUT_RISK_TIER}" == "medium" || "${INPUT_RISK_TIER}" == "high" ]]; then
            risk_tier="${INPUT_RISK_TIER}"
          fi
          input_correction_signal="$(echo "${INPUT_CORRECTION_SIGNAL:-auto}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${input_correction_signal}" == "true" || "${input_correction_signal}" == "false" ]]; then
            correction_signal="${input_correction_signal}"
          fi
          input_lessons_required="$(echo "${INPUT_LESSONS_REQUIRED:-auto}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${input_lessons_required}" == "true" || "${input_lessons_required}" == "false" ]]; then
            lessons_required="${input_lessons_required}"
          fi
          if [[ "${correction_signal}" == "true" ]]; then
            lessons_required="true"
          fi

          {
            echo "issue_number=${ISSUE_NUMBER}"
            echo "issue_title<<EOF"
            echo "${TITLE}"
            echo "EOF"
            echo "issue_body<<EOF"
            echo "${BODY}"
            echo "EOF"
            echo "is_large_refactor=${HAS_LARGE_REFACTOR}"
            echo "should_run=${SHOULD_RUN}"
            echo "skip_reason=${SKIP_REASON}"
            echo "target_repo=${TARGET_REPO}"
            echo "branch_name=${BRANCH_NAME}"
            echo "risk_tier=${risk_tier}"
            echo "risk_score=${risk_score}"
            echo "risk_reasons=${risk_reasons}"
            echo "lessons_required=${lessons_required}"
            echo "correction_signal=${correction_signal}"
            echo "preflight_cycles_floor=${preflight_cycles_floor}"
            echo "implementation_dialogue_rounds_floor=${implementation_dialogue_rounds_floor}"
            echo "context_budget_initial=${context_budget_initial}"
            echo "context_budget_max=${context_budget_max}"
            echo "context_budget_floor_initial=${context_budget_floor_initial}"
            echo "context_budget_floor_max=${context_budget_floor_max}"
            echo "context_budget_floor_span=${context_budget_floor_span}"
            echo "context_budget_guard_applied=${context_budget_guard_applied}"
            echo "context_budget_guard_reasons=${context_budget_guard_reasons}"
          } >> "${GITHUB_OUTPUT}"

      - name: Notify pending implement confirmation
        if: ${{ steps.ctx.outputs.should_run != 'true' && steps.ctx.outputs.skip_reason == 'missing-implement-confirmed' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ steps.ctx.outputs.issue_number }}" --repo "${GITHUB_REPOSITORY}" --body "Implementation intent detected, but \`implement-confirmed\` is missing. Add that label to allow Codex execution."

      - name: Add processing label
        if: ${{ steps.ctx.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ steps.ctx.outputs.issue_number }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --remove-label "completed" --remove-label "needs-review" || true
          gh issue edit "${{ steps.ctx.outputs.issue_number }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --add-label "processing"

  credential-guard:
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      can_run: ${{ steps.guard.outputs.can_run }}
      skip_reason: ${{ steps.guard.outputs.skip_reason }}
      runner_json: ${{ steps.guard.outputs.runner_json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Resolve live failover state
        id: live_failover
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_FAILOVER_STATE: ${{ vars.FUGUE_FAILOVER_STATE || 'healthy' }}
          GHA_EXECUTION_MODE: ${{ vars.FUGUE_GHA_EXECUTION_MODE || 'full' }}
          RUNNER_LABEL: ${{ vars.FUGUE_SUBSCRIPTION_RUNNER_LABEL || 'fugue-subscription' }}
          PRIMARY_HEARTBEAT_AT: ${{ vars.FUGUE_PRIMARY_HEARTBEAT_AT || '' }}
          PRIMARY_HEARTBEAT_TTL_MINUTES: ${{ vars.FUGUE_PRIMARY_HEARTBEAT_TTL_MINUTES || '8' }}
          PRIMARY_HEARTBEAT_GRACE_MULTIPLIER: ${{ vars.FUGUE_PRIMARY_HEARTBEAT_GRACE_MULTIPLIER || '3' }}
        run: |
          set -euo pipefail

          online_count=0
          runners_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" 2>/dev/null || echo '{"runners":[]}')"
          if echo "${runners_json}" | jq -e '.runners' >/dev/null 2>&1; then
            online_count="$(echo "${runners_json}" | jq --arg label "${RUNNER_LABEL}" '[.runners[] | select(.status == "online") | select(any(.labels[]?; .name == $label))] | length')"
          fi

          eval "$(
            scripts/lib/resolve-primary-heartbeat-state.sh \
              --gha-execution-mode "${GHA_EXECUTION_MODE}" \
              --current-state "${CURRENT_FAILOVER_STATE}" \
              --runner-online-count "${online_count}" \
              --pending-count 0 \
              --mainframe-pending-count 1 \
              --router-stale false \
              --mainframe-stale false \
              --heartbeat-at "${PRIMARY_HEARTBEAT_AT}" \
              --heartbeat-ttl-minutes "${PRIMARY_HEARTBEAT_TTL_MINUTES}" \
              --heartbeat-grace-multiplier "${PRIMARY_HEARTBEAT_GRACE_MULTIPLIER}" \
              --format env
          )"

          {
            echo "failover_state=${failover_state}"
            echo "failover_reason=${failover_reason}"
            echo "heartbeat_status=${heartbeat_status}"
          } >> "${GITHUB_OUTPUT}"

      - name: Guard implementation credentials
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          TARGET_REPO: ${{ needs.prepare.outputs.target_repo }}
          TARGET_REPO_PAT: ${{ secrets.TARGET_REPO_PAT }}
          FREEE_HINT_APPLIED: ${{ inputs.freee_hint_applied }}
          FREEE_APPROVAL_REQUIRED_ACTIONS: ${{ inputs.freee_approval_required_actions }}
          FREEE_READONLY_ENVIRONMENT: ${{ inputs.freee_readonly_environment }}
          EXECUTION_MODE: ${{ inputs.execution_mode }}
          GHA_EXECUTION_MODE: ${{ vars.FUGUE_GHA_EXECUTION_MODE || 'full' }}
          FAILOVER_STATE: ${{ steps.live_failover.outputs.failover_state || vars.FUGUE_FAILOVER_STATE || 'healthy' }}
          SUBSCRIPTION_RUNNER_LABEL: ${{ vars.FUGUE_SUBSCRIPTION_RUNNER_LABEL || 'fugue-subscription' }}
        run: |
          set -euo pipefail

          can_run="true"
          skip_reason=""
          runner_json=""

          execution_mode="$(echo "${EXECUTION_MODE:-primary}" | tr '[:upper:]' '[:lower:]' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          case "${execution_mode}" in
            primary|backup-safe|backup-heavy|record-only) ;;
            *) execution_mode="primary" ;;
          esac

          gha_mode="$(echo "${GHA_EXECUTION_MODE:-full}" | tr '[:upper:]' '[:lower:]' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          if [[ "${gha_mode}" != "record-only" ]]; then
            gha_mode="full"
          fi

          subscription_runner_label="$(echo "${SUBSCRIPTION_RUNNER_LABEL:-fugue-subscription}" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          if [[ -z "${subscription_runner_label}" ]]; then
            subscription_runner_label="fugue-subscription"
          fi

          failover_state="$(echo "${FAILOVER_STATE:-healthy}" | tr '[:upper:]' '[:lower:]' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          case "${failover_state}" in
            healthy|degraded|offline|recovered) ;;
            *) failover_state="healthy" ;;
          esac

          if [[ "${execution_mode}" == "backup-heavy" ]]; then
            runner_json='"ubuntu-latest"'
          else
            runner_json="$(jq -cn --arg label "${subscription_runner_label}" '["self-hosted",$label]')"
          fi

          if [[ "${execution_mode}" == "backup-safe" ]]; then
            can_run="false"
            skip_reason="backup-safe-review-only"
            gh issue comment "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" --body "Codex implementation skipped: backup-safe mode is review-only. Use backup-heavy or primary mode for implementation."
          elif [[ "${gha_mode}" == "record-only" && "${execution_mode}" == "primary" && "${failover_state}" != "degraded" && "${failover_state}" != "offline" ]]; then
            can_run="false"
            skip_reason="record-only-primary-active"
            gh issue comment "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" --body "Codex implementation skipped: GHA is in record-only mode while the primary executor is considered available (\`${failover_state}\`)."
          fi

          if [[ "${can_run}" == "true" && "${TARGET_REPO}" != "${GITHUB_REPOSITORY}" && -z "${TARGET_REPO_PAT:-}" ]]; then
            can_run="false"
            skip_reason="missing-target-repo-pat"
            gh issue comment "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" --body "Cannot implement into ${TARGET_REPO}: missing secret \`TARGET_REPO_PAT\`. Escalating to humans."
          fi

          if [[ "${can_run}" == "true" && "${FREEE_HINT_APPLIED:-false}" == "true" && -n "$(printf '%s' "${FREEE_APPROVAL_REQUIRED_ACTIONS:-}" | tr -d '[:space:]')" ]]; then
            can_run="false"
            skip_reason="freee-approval-required-actions"
            gh issue comment "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" --body "Cannot run Codex implementation: freee approval-required actions are present (\`${FREEE_APPROVAL_REQUIRED_ACTIONS}\`). Human approval is required before execution."
          fi

          if [[ "${can_run}" == "true" && "${FREEE_HINT_APPLIED:-false}" == "true" && -z "$(printf '%s' "${FREEE_READONLY_ENVIRONMENT:-}" | tr -d '[:space:]')" ]]; then
            can_run="false"
            skip_reason="missing-freee-readonly-environment"
            gh issue comment "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" --body "Cannot run freee readonly preflight: missing input \`freee_readonly_environment\`. Configure protected environment \`FUGUE_FREEE_READONLY_ENV\` and retry."
          fi

          if [[ "${can_run}" != "true" ]]; then
            gh issue edit "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" --add-label "needs-human" --remove-label "processing" || true
          fi

          {
            echo "can_run=${can_run}"
            echo "skip_reason=${skip_reason}"
            echo "runner_json=${runner_json}"
          } >> "${GITHUB_OUTPUT}"

  workspace-preflight:
    if: ${{ needs.prepare.outputs.should_run == 'true' && needs.credential-guard.outputs.can_run == 'true' && inputs.workspace_hint_applied == 'true' }}
    needs: [prepare, credential-guard]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ inputs.workspace_readonly_environment }}
    outputs:
      workspace_preflight_status: ${{ steps.workspace_preflight.outputs.workspace_preflight_status }}
      workspace_report_path: ${{ steps.workspace_preflight.outputs.workspace_report_path }}
      workspace_summary: ${{ steps.workspace_preflight.outputs.workspace_summary }}
      workspace_artifact_name: ${{ steps.workspace_meta.outputs.workspace_artifact_name }}
    steps:
      - name: Checkout orchestration repository
        uses: actions/checkout@v6
        with:
          repository: cursorvers/fugue-orchestrator
          token: ${{ secrets.TARGET_REPO_PAT || github.token }}
          path: .fugue-orchestrator
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Google Workspace CLI
        run: npm install -g @googleworkspace/cli

      - name: Set Workspace artifact metadata
        id: workspace_meta
        run: |
          echo "workspace_artifact_name=googleworkspace-preflight-${{ needs.prepare.outputs.issue_number }}" >> "${GITHUB_OUTPUT}"

      - name: Run Google Workspace readonly preflight
        id: workspace_preflight
        env:
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.prepare.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.prepare.outputs.issue_body }}
          WORKSPACE_ACTIONS: ${{ inputs.workspace_readonly_actions || inputs.workspace_action_hint }}
          WORKSPACE_DOMAINS: ${{ inputs.workspace_domain_hint }}
          WORKSPACE_REASON: ${{ inputs.workspace_reason }}
          WORKSPACE_SUGGESTED_PHASES: ${{ inputs.workspace_suggested_phases }}
          OUT_DIR: .fugue/pre-implement
          RUN_DIR: .fugue/pre-implement/googleworkspace-run
          REPORT_PATH: .fugue/pre-implement/issue-${{ needs.prepare.outputs.issue_number }}-googleworkspace.md
          ADAPTER: .fugue-orchestrator/scripts/lib/googleworkspace-cli-adapter.sh
          GOOGLE_WORKSPACE_CLI_CREDENTIALS_JSON: ${{ secrets.GOOGLE_WORKSPACE_CLI_CREDENTIALS_JSON }}
        run: bash .fugue-orchestrator/scripts/harness/googleworkspace-preflight-enrich.sh

      - name: Upload Google Workspace preflight artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.workspace_meta.outputs.workspace_artifact_name }}
          path: |
            .fugue/pre-implement/issue-${{ needs.prepare.outputs.issue_number }}-googleworkspace.md
            .fugue/pre-implement/googleworkspace-run
          if-no-files-found: ignore

  freee-preflight:
    if: ${{ needs.prepare.outputs.should_run == 'true' && needs.credential-guard.outputs.can_run == 'true' && inputs.freee_hint_applied == 'true' }}
    needs: [prepare, credential-guard]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    environment:
      name: ${{ inputs.freee_readonly_environment }}
    outputs:
      freee_preflight_status: ${{ steps.freee_preflight.outputs.freee_preflight_status }}
      freee_report_path: ${{ steps.freee_preflight.outputs.freee_report_path }}
      freee_summary: ${{ steps.freee_preflight.outputs.freee_summary }}
      freee_artifact_name: ${{ steps.freee_meta.outputs.freee_artifact_name }}
    steps:
      - name: Checkout orchestration repository
        uses: actions/checkout@v6
        with:
          repository: cursorvers/fugue-orchestrator
          token: ${{ github.token }}
          path: .fugue-orchestrator
          fetch-depth: 1
          persist-credentials: false

      - name: Set freee artifact metadata
        id: freee_meta
        run: |
          echo "freee_artifact_name=freee-preflight-${{ needs.prepare.outputs.issue_number }}" >> "${GITHUB_OUTPUT}"

      - name: Run freee readonly preflight
        id: freee_preflight
        env:
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.prepare.outputs.issue_title }}
          FREEE_ACTIONS: ${{ inputs.freee_readonly_actions || inputs.freee_action_hint }}
          FREEE_DOMAINS: ${{ inputs.freee_domain_hint }}
          FREEE_REASON: ${{ inputs.freee_reason }}
          FREEE_SUGGESTED_PHASES: ${{ inputs.freee_suggested_phases }}
          OUT_DIR: .fugue/pre-implement
          RUN_DIR: .fugue/pre-implement/freee-run
          REPORT_PATH: .fugue/pre-implement/issue-${{ needs.prepare.outputs.issue_number }}-freee.md
          POLICY_FILE: .fugue-orchestrator/config/integrations/freee-kernel-policy.json
          ADAPTER: .fugue-orchestrator/scripts/lib/freee-readonly-adapter.sh
          FREEE_ACCESS_TOKEN: ${{ secrets.FREEE_ACCESS_TOKEN || '' }}
          FREEE_REFRESH_TOKEN: ${{ secrets.FREEE_REFRESH_TOKEN || '' }}
          FREEE_CLIENT_ID: ${{ secrets.FREEE_CLIENT_ID || '' }}
          FREEE_CLIENT_SECRET: ${{ secrets.FREEE_CLIENT_SECRET || '' }}
          FREEE_COMPANY_ID: ${{ vars.FUGUE_FREEE_COMPANY_ID || '' }}
          FREEE_REQUIRE_RUNTIME_AUTH: "true"
        run: bash .fugue-orchestrator/scripts/harness/freee-preflight-enrich.sh

      - name: Upload freee preflight artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.freee_meta.outputs.freee_artifact_name }}
          path: .fugue/pre-implement/issue-${{ needs.prepare.outputs.issue_number }}-freee.md
          if-no-files-found: ignore

  implement:
    if: ${{ always() && needs.prepare.outputs.should_run == 'true' && needs.credential-guard.outputs.can_run == 'true' && needs.workspace-preflight.result != 'failure' && needs.workspace-preflight.result != 'cancelled' && needs.freee-preflight.result != 'failure' && needs.freee-preflight.result != 'cancelled' }}
    needs: [prepare, credential-guard, workspace-preflight, freee-preflight]
    runs-on: ${{ fromJSON(needs.credential-guard.outputs.runner_json) }}
    timeout-minutes: 90
    outputs:
      pr_url: ${{ steps.create-pr.outputs.pr_url }}
      codex_exit: ${{ steps.codex.outputs.exit_code }}
      research_report_path: ${{ steps.codex.outputs.research_report_path }}
      plan_report_path: ${{ steps.codex.outputs.plan_report_path }}
      critic_report_path: ${{ steps.codex.outputs.critic_report_path }}
      preflight_report_path: ${{ steps.codex.outputs.preflight_report_path }}
      implementation_report_path: ${{ steps.codex.outputs.implementation_report_path }}
      todo_report_path: ${{ steps.codex.outputs.todo_report_path }}
      lessons_report_path: ${{ steps.codex.outputs.lessons_report_path }}

    steps:
      - name: Checkout current target repository
        if: ${{ needs.prepare.outputs.target_repo == github.repository }}
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout external target repository
        if: ${{ needs.prepare.outputs.target_repo != github.repository }}
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.prepare.outputs.target_repo }}
          token: ${{ secrets.TARGET_REPO_PAT || github.token }}
          ref: ${{ inputs.target_branch }}
          fetch-depth: 1

      - name: Checkout orchestration repository (same-repo)
        if: ${{ github.repository == 'cursorvers/fugue-orchestrator' }}
        uses: actions/checkout@v6
        with:
          path: .fugue-orchestrator
          fetch-depth: 1

      - name: Checkout orchestration repository (external)
        if: ${{ github.repository != 'cursorvers/fugue-orchestrator' }}
        uses: actions/checkout@v6
        with:
          repository: cursorvers/fugue-orchestrator
          token: ${{ secrets.TARGET_REPO_PAT || github.token }}
          path: .fugue-orchestrator
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Codex CLI
        run: |
          npm install -g @openai/codex
          codex --version

      - name: Sync NotebookLM skills on self-hosted runner
        if: ${{ inputs.content_hint_applied == 'true' && (contains(inputs.content_action_hint, 'notebooklm-visual-brief') || contains(inputs.content_action_hint, 'notebooklm-slide-prep') || contains(inputs.content_skill_hint, 'notebooklm-visual-brief') || contains(inputs.content_skill_hint, 'notebooklm-slide-prep')) }}
        env:
          CONTENT_ACTION_HINT: ${{ inputs.content_action_hint }}
          CONTENT_SKILL_HINT: ${{ inputs.content_skill_hint }}
        run: |
          set -euo pipefail
          args=(--target both)
          if [[ "${CONTENT_ACTION_HINT}${CONTENT_SKILL_HINT}" == *"notebooklm-slide-prep"* ]]; then
            args+=(--with-optional)
          fi
          bash .fugue-orchestrator/scripts/skills/sync-notebooklm-skills.sh "${args[@]}"

      - name: Ensure Copilot CLI continuity path
        if: ${{ inputs.vote_command == 'true' }}
        id: copilot
        run: |
          bash .fugue-orchestrator/scripts/harness/ensure-copilot-cli.sh
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || secrets.FUGUE_COPILOT_TOKEN || github.token }}

      - name: Require Copilot CLI continuity path
        if: ${{ inputs.vote_command == 'true' }}
        run: |
          set -euo pipefail
          if [[ "${COPILOT_AVAILABLE}" != "true" ]]; then
            echo "Copilot CLI continuity path is required for /vote -> implement in GHA." >&2
            echo "reason=${COPILOT_REASON}" >&2
            exit 1
          fi
        env:
          COPILOT_AVAILABLE: ${{ steps.copilot.outputs.available || 'false' }}
          COPILOT_REASON: ${{ steps.copilot.outputs.reason || 'unknown' }}

      - name: Create working branch
        run: |
          git checkout -b "${{ needs.prepare.outputs.branch_name }}"

      - name: Download Google Workspace preflight artifact
        if: ${{ inputs.workspace_hint_applied == 'true' && needs.workspace-preflight.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.workspace-preflight.outputs.workspace_artifact_name }}
          path: .

      - name: Download freee preflight artifact
        if: ${{ inputs.freee_hint_applied == 'true' && needs.freee-preflight.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.freee-preflight.outputs.freee_artifact_name }}
          path: .

      - name: Run /vote kernel council preflight
        if: ${{ inputs.vote_command == 'true' }}
        id: kernel_preflight_council
        env:
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.prepare.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.prepare.outputs.issue_body }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || secrets.FUGUE_COPILOT_TOKEN || github.token }}
          COPILOT_CLI_BIN: ${{ steps.copilot.outputs.bin || 'copilot' }}
          HAS_COPILOT_CLI: ${{ steps.copilot.outputs.available || 'false' }}
          CODEX_MAIN_MODEL: ${{ vars.FUGUE_CODEX_MAIN_MODEL || 'gpt-5.4' }}
          CODEX_MULTI_AGENT_MODEL: ${{ inputs.codex_model }}
          GLM_MODEL: ${{ vars.FUGUE_GLM_MODEL || 'glm-5' }}
          CLAUDE_OPUS_MODEL: ${{ vars.FUGUE_CLAUDE_OPUS_MODEL || 'claude-opus-4-6' }}
          CLAUDE_SONNET4_MODEL: ${{ vars.FUGUE_CLAUDE_SONNET4_MODEL || 'claude-opus-4-6' }}
          CLAUDE_SONNET6_MODEL: ${{ vars.FUGUE_CLAUDE_SONNET6_MODEL || 'claude-opus-4-6' }}
          GEMINI_MODEL: ${{ vars.FUGUE_GEMINI_MODEL || 'gemini-2.5-pro' }}
          XAI_MODEL_LATEST: ${{ vars.FUGUE_XAI_MODEL || 'grok-4' }}
          GEMINI_FALLBACK_MODEL: ${{ vars.FUGUE_GEMINI_FALLBACK_MODEL || 'gemini-2.5-flash' }}
          RISK_TIER: ${{ needs.prepare.outputs.risk_tier }}
          VOTE_COMMAND_INPUT: "true"
          COUNCIL_STAGE: "preflight"
          COUNCIL_RUN_DIR: ".fugue/kernel-council/preflight"
          COUNCIL_EXECUTION_PROFILE: "subscription-strict"
          COUNCIL_FORCE_COPILOT_CONTINUITY: "true"
          COUNCIL_FORCE_MISSING_PROVIDER: ${{ inputs.council_force_missing_provider || 'none' }}
          COUNCIL_MULTI_AGENT_MODE: "standard"
          COUNCIL_GLM_SUBAGENT_MODE: "off"
          CLAUDE_ASSIST_EXECUTION_POLICY: "hybrid"
          STRICT_OPUS_ASSIST_DIRECT: "false"
        run: bash .fugue-orchestrator/scripts/harness/run-kernel-council-review.sh

      - name: Run parallel preflight nodes
        id: preflight_parallel
        env:
          ISSUE_TITLE: ${{ needs.prepare.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.prepare.outputs.issue_body }}
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          CODEX_MODEL: ${{ inputs.codex_model }}
          PREFLIGHT_PARALLEL_ENABLED: ${{ vars.FUGUE_PREFLIGHT_PARALLEL_ENABLED || 'true' }}
          PREFLIGHT_PARALLEL_TIMEOUT_SEC: ${{ vars.FUGUE_PREFLIGHT_PARALLEL_TIMEOUT_SEC || '240' }}
        run: |
          set -euo pipefail

          issue_num="${ISSUE_NUMBER}"
          artifact_dir=".fugue/pre-implement"
          research_report="${artifact_dir}/issue-${issue_num}-research.md"
          plan_report="${artifact_dir}/issue-${issue_num}-plan.md"
          critic_report="${artifact_dir}/issue-${issue_num}-critic.md"
          log_dir="/tmp/fugue-preflight-parallel-${issue_num}"
          mkdir -p "${artifact_dir}" "${log_dir}"

          {
            echo "research_report_path=${research_report}"
            echo "plan_report_path=${plan_report}"
            echo "critic_report_path=${critic_report}"
            echo "parallel_preflight_log_dir=${log_dir}"
          } >> "${GITHUB_OUTPUT}"

          enabled="$(echo "${PREFLIGHT_PARALLEL_ENABLED:-true}" | tr '[:upper:]' '[:lower:]' | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          if [[ "${enabled}" != "true" ]]; then
            enabled="false"
          fi
          timeout_sec="$(echo "${PREFLIGHT_PARALLEL_TIMEOUT_SEC:-240}" | tr -cd '0-9')"
          if [[ -z "${timeout_sec}" ]]; then
            timeout_sec="240"
          fi
          if (( timeout_sec < 60 )); then
            timeout_sec=60
          elif (( timeout_sec > 900 )); then
            timeout_sec=900
          fi

          if [[ "${enabled}" != "true" ]]; then
            printf '%s\n' \
              "# Issue #${issue_num} Research Artifact" \
              "" \
              "Parallel preflight is disabled. Generate deep research during the main Codex run." > "${research_report}"
            printf '%s\n' \
              "# Issue #${issue_num} Plan Artifact" \
              "" \
              "Parallel preflight is disabled. Generate and refine plan during the main Codex run." > "${plan_report}"
            printf '%s\n' \
              "# Issue #${issue_num} Critic Artifact" \
              "" \
              "Parallel preflight is disabled. Generate critical review during the main Codex run." > "${critic_report}"
            echo "parallel_preflight_enabled=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "parallel_preflight_enabled=true" >> "${GITHUB_OUTPUT}"

          nodes=(research plan critic)
          work_root="$(mktemp -d "/tmp/fugue-preflight-worktrees-${issue_num}-XXXX")"
          cleanup() {
            for node in "${nodes[@]}"; do
              workdir="${work_root}/${node}"
              if [[ -d "${workdir}" ]]; then
                git worktree remove --force "${workdir}" >/dev/null 2>&1 || true
              fi
            done
            rm -rf "${work_root}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          make_fallback() {
            local node="$1"
            local outfile="$2"
            printf '%s\n' \
              "# Issue #${issue_num} ${node^} Artifact" \
              "" \
              "Codex parallel preflight node '${node}' did not produce the artifact file." \
              "Use this as a fallback seed and replace with concrete findings in the main run." > "${outfile}"
          }

          pids=()
          for node in "${nodes[@]}"; do
            workdir="${work_root}/${node}"
            prompt_file="${work_root}/${node}.prompt.md"
            node_out_rel="${artifact_dir}/issue-${issue_num}-${node}.md"
            git worktree add --detach "${workdir}" HEAD >/dev/null 2>&1

            role_instruction=""
            case "${node}" in
              research)
                role_instruction="Map current implementation touchpoints, hidden coupling, and likely impact files."
                ;;
              plan)
                role_instruction="Propose concrete implementation plan with sequencing, rollback, and verification checkpoints."
                ;;
              critic)
                role_instruction="Challenge weak assumptions, list failure scenarios, and define guardrails/regression tests."
                ;;
            esac

            printf '%s\n' \
              "## Task" \
              "Issue #${issue_num}: ${ISSUE_TITLE}" \
              "" \
              "${ISSUE_BODY}" \
              "" \
              "## Role" \
              "${role_instruction}" \
              "" \
              "## Output Contract" \
              "- Create exactly one markdown file at \`${node_out_rel}\`." \
              "- Do not modify any other file." \
              "- Start with heading: \`# Issue #${issue_num} ${node^} Artifact\`." \
              "- Keep output concise and actionable." > "${prompt_file}"

            (
              set +e
              cd "${workdir}"
              mkdir -p "${artifact_dir}"
              if command -v timeout >/dev/null 2>&1; then
                timeout "${timeout_sec}" codex exec \
                  --model "${CODEX_MODEL}" \
                  --full-auto \
                  "$(cat "${prompt_file}")" > "${log_dir}/${node}.log" 2>&1
              else
                codex exec \
                  --model "${CODEX_MODEL}" \
                  --full-auto \
                  "$(cat "${prompt_file}")" > "${log_dir}/${node}.log" 2>&1
              fi
              rc=$?
              out_file="${workdir}/${node_out_rel}"
              if [[ ! -f "${out_file}" ]]; then
                make_fallback "${node}" "${out_file}"
              fi
              echo "${rc}" > "${log_dir}/${node}.rc"
              exit 0
            ) &
            pids+=("$!")
          done

          for pid in "${pids[@]}"; do
            wait "${pid}" || true
          done

          parallel_failures=0
          for node in "${nodes[@]}"; do
            src="${work_root}/${node}/${artifact_dir}/issue-${issue_num}-${node}.md"
            dst="${artifact_dir}/issue-${issue_num}-${node}.md"
            if [[ -f "${src}" ]]; then
              cp "${src}" "${dst}"
            else
              make_fallback "${node}" "${dst}"
              parallel_failures=$((parallel_failures + 1))
            fi
            if [[ -f "${log_dir}/${node}.rc" ]]; then
              rc_val="$(cat "${log_dir}/${node}.rc")"
              if [[ "${rc_val}" != "0" ]]; then
                parallel_failures=$((parallel_failures + 1))
              fi
            fi
          done

          if (( parallel_failures > 0 )); then
            echo "parallel preflight completed with ${parallel_failures} degraded node(s)" > "${log_dir}/summary.txt"
          else
            echo "parallel preflight completed successfully" > "${log_dir}/summary.txt"
          fi

      - name: Run NotebookLM content preflight
        if: ${{ inputs.content_hint_applied == 'true' && (contains(inputs.content_action_hint, 'notebooklm-visual-brief') || contains(inputs.content_action_hint, 'notebooklm-slide-prep') || contains(inputs.content_skill_hint, 'notebooklm-visual-brief') || contains(inputs.content_skill_hint, 'notebooklm-slide-prep')) }}
        id: notebooklm_preflight
        env:
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.prepare.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.prepare.outputs.issue_body }}
          CONTENT_HINT_APPLIED: ${{ inputs.content_hint_applied }}
          CONTENT_ACTION_HINT: ${{ inputs.content_action_hint }}
          CONTENT_SKILL_HINT: ${{ inputs.content_skill_hint }}
          CONTENT_REASON: ${{ inputs.content_reason }}
          CONTENT_PRIMARY_ACTION_HINT: ${{ inputs.content_primary_action_hint }}
          CONTENT_PRIMARY_SKILL_HINT: ${{ inputs.content_primary_skill_hint }}
          CONTENT_SUPPORT_ACTION_HINT: ${{ inputs.content_support_action_hint }}
          CONTENT_SUPPORT_SKILL_HINT: ${{ inputs.content_support_skill_hint }}
          RESEARCH_REPORT_PATH: ${{ steps.preflight_parallel.outputs.research_report_path }}
          PLAN_REPORT_PATH: ${{ steps.preflight_parallel.outputs.plan_report_path }}
          CRITIC_REPORT_PATH: ${{ steps.preflight_parallel.outputs.critic_report_path }}
          OUT_DIR: .fugue/pre-implement
          RUN_DIR: .fugue/pre-implement/notebooklm-run
          REPORT_PATH: .fugue/pre-implement/issue-${{ needs.prepare.outputs.issue_number }}-notebooklm.md
          ADAPTER: .fugue-orchestrator/scripts/lib/notebooklm-cli-adapter.sh
          NOTEBOOKLM_RUNTIME_ENABLED: ${{ vars.FUGUE_NOTEBOOKLM_RUNTIME_ENABLED || 'false' }}
          NOTEBOOKLM_REQUIRE_RUNTIME_AUTH: ${{ vars.FUGUE_NOTEBOOKLM_REQUIRE_RUNTIME_AUTH || 'false' }}
          NOTEBOOKLM_HUMAN_APPROVED: "true"
          NOTEBOOKLM_SENSITIVITY: ${{ vars.FUGUE_NOTEBOOKLM_SENSITIVITY || 'internal' }}
          NLM_BIN: ${{ vars.FUGUE_NOTEBOOKLM_BIN || 'nlm' }}
          NLM_AUTH_TOKEN: ${{ secrets.FUGUE_NOTEBOOKLM_AUTH_TOKEN || secrets.NLM_AUTH_TOKEN || '' }}
          NLM_COOKIES: ${{ secrets.FUGUE_NOTEBOOKLM_COOKIES || secrets.NLM_COOKIES || '' }}
        run: bash .fugue-orchestrator/scripts/harness/notebooklm-preflight-enrich.sh

      - name: Record compare mode summary
        if: ${{ always() }}
        env:
          CONTENT_HINT_APPLIED: ${{ inputs.content_hint_applied }}
          CONTENT_PRIMARY_ACTION_HINT: ${{ inputs.content_primary_action_hint }}
          CONTENT_PRIMARY_SKILL_HINT: ${{ inputs.content_primary_skill_hint }}
          CONTENT_SUPPORT_ACTION_HINT: ${{ inputs.content_support_action_hint }}
          CONTENT_SUPPORT_SKILL_HINT: ${{ inputs.content_support_skill_hint }}
          COMPARE_MODE: ${{ inputs.compare_mode }}
          COMPARE_REQUIRED_ARTIFACTS: ${{ inputs.compare_required_artifacts }}
        run: |
          {
            echo "## Compare Mode"
            echo ""
            echo "- content_hint_applied: \`${CONTENT_HINT_APPLIED:-false}\`"
            echo "- primary: skill=\`${CONTENT_PRIMARY_SKILL_HINT:-none}\`, action=\`${CONTENT_PRIMARY_ACTION_HINT:-none}\`"
            echo "- support: skill=\`${CONTENT_SUPPORT_SKILL_HINT:-none}\`, action=\`${CONTENT_SUPPORT_ACTION_HINT:-none}\`"
            echo "- compare_mode: \`${COMPARE_MODE:-off}\`"
            echo "- compare_required_artifacts: \`${COMPARE_REQUIRED_ARTIFACTS:-none}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Run Codex CLI
        id: codex
        env:
          ISSUE_TITLE: ${{ needs.prepare.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.prepare.outputs.issue_body }}
          CODEX_MODEL: ${{ inputs.codex_model }}
          REFINEMENT_CYCLES: ${{ inputs.refinement_cycles }}
          IMPLEMENTATION_DIALOGUE_ROUNDS: ${{ inputs.implementation_dialogue_rounds }}
          ORCHESTRATION_PROFILE: ${{ inputs.orchestration_profile }}
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          LARGE_REFACTOR_LABEL: ${{ needs.prepare.outputs.is_large_refactor }}
          RISK_TIER: ${{ needs.prepare.outputs.risk_tier }}
          RISK_SCORE: ${{ needs.prepare.outputs.risk_score }}
          RISK_REASONS: ${{ needs.prepare.outputs.risk_reasons }}
          LESSONS_REQUIRED: ${{ needs.prepare.outputs.lessons_required }}
          CORRECTION_SIGNAL: ${{ needs.prepare.outputs.correction_signal }}
          PREFLIGHT_CYCLES_FLOOR: ${{ needs.prepare.outputs.preflight_cycles_floor }}
          IMPLEMENTATION_DIALOGUE_ROUNDS_FLOOR: ${{ needs.prepare.outputs.implementation_dialogue_rounds_floor }}
          CONTEXT_BUDGET_INITIAL: ${{ needs.prepare.outputs.context_budget_initial }}
          CONTEXT_BUDGET_MAX: ${{ needs.prepare.outputs.context_budget_max }}
          CONTEXT_BUDGET_FLOOR_INITIAL: ${{ needs.prepare.outputs.context_budget_floor_initial }}
          CONTEXT_BUDGET_FLOOR_MAX: ${{ needs.prepare.outputs.context_budget_floor_max }}
          CONTEXT_BUDGET_FLOOR_SPAN: ${{ needs.prepare.outputs.context_budget_floor_span }}
          CONTEXT_BUDGET_GUARD_APPLIED: ${{ needs.prepare.outputs.context_budget_guard_applied }}
          CONTEXT_BUDGET_GUARD_REASONS: ${{ needs.prepare.outputs.context_budget_guard_reasons }}
          RESEARCH_REPORT_PATH: ${{ steps.preflight_parallel.outputs.research_report_path }}
          PLAN_REPORT_PATH: ${{ steps.preflight_parallel.outputs.plan_report_path }}
          CRITIC_REPORT_PATH: ${{ steps.preflight_parallel.outputs.critic_report_path }}
          WORKSPACE_REPORT_PATH: ${{ needs.workspace-preflight.outputs.workspace_report_path }}
          WORKSPACE_SUMMARY: ${{ needs.workspace-preflight.outputs.workspace_summary }}
          WORKSPACE_PREFLIGHT_STATUS: ${{ needs.workspace-preflight.outputs.workspace_preflight_status }}
          FREEE_REPORT_PATH: ${{ needs.freee-preflight.outputs.freee_report_path }}
          FREEE_SUMMARY: ${{ needs.freee-preflight.outputs.freee_summary }}
          FREEE_PREFLIGHT_STATUS: ${{ needs.freee-preflight.outputs.freee_preflight_status }}
          NOTEBOOKLM_REPORT_PATH: ${{ steps.notebooklm_preflight.outputs.notebooklm_report_path }}
          NOTEBOOKLM_SUMMARY: ${{ steps.notebooklm_preflight.outputs.notebooklm_summary }}
          NOTEBOOKLM_PREFLIGHT_STATUS: ${{ steps.notebooklm_preflight.outputs.notebooklm_preflight_status }}
          NOTEBOOKLM_RECEIPT_PATH: ${{ steps.notebooklm_preflight.outputs.notebooklm_receipt_path }}
          CONTENT_HINT_APPLIED: ${{ inputs.content_hint_applied }}
          CONTENT_ACTION_HINT: ${{ inputs.content_action_hint }}
          CONTENT_SKILL_HINT: ${{ inputs.content_skill_hint }}
          CONTENT_REASON: ${{ inputs.content_reason }}
          CONTENT_PRIMARY_ACTION_HINT: ${{ inputs.content_primary_action_hint }}
          CONTENT_PRIMARY_SKILL_HINT: ${{ inputs.content_primary_skill_hint }}
          CONTENT_SUPPORT_ACTION_HINT: ${{ inputs.content_support_action_hint }}
          CONTENT_SUPPORT_SKILL_HINT: ${{ inputs.content_support_skill_hint }}
          COMPARE_MODE: ${{ inputs.compare_mode }}
          COMPARE_REQUIRED_ARTIFACTS: ${{ inputs.compare_required_artifacts }}
        run: bash .fugue-orchestrator/scripts/harness/codex-execute-validate.sh

      - name: Summarize implementation diff
        if: ${{ steps.codex.outputs.exit_code == '0' }}
        id: diff_summary
        run: |
          set -euo pipefail
          {
            echo "diff_stat<<EOF"
            git diff --stat
            echo "EOF"
            echo "changed_files<<EOF"
            git diff --name-only
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Run /vote kernel council final review
        if: ${{ inputs.vote_command == 'true' && steps.codex.outputs.exit_code == '0' }}
        id: kernel_final_council
        env:
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          ISSUE_TITLE: ${{ needs.prepare.outputs.issue_title }}
          ISSUE_BODY: ${{ needs.prepare.outputs.issue_body }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || secrets.FUGUE_COPILOT_TOKEN || github.token }}
          COPILOT_CLI_BIN: ${{ steps.copilot.outputs.bin || 'copilot' }}
          HAS_COPILOT_CLI: ${{ steps.copilot.outputs.available || 'false' }}
          CODEX_MAIN_MODEL: ${{ vars.FUGUE_CODEX_MAIN_MODEL || 'gpt-5.4' }}
          CODEX_MULTI_AGENT_MODEL: ${{ inputs.codex_model }}
          GLM_MODEL: ${{ vars.FUGUE_GLM_MODEL || 'glm-5' }}
          CLAUDE_OPUS_MODEL: ${{ vars.FUGUE_CLAUDE_OPUS_MODEL || 'claude-opus-4-6' }}
          CLAUDE_SONNET4_MODEL: ${{ vars.FUGUE_CLAUDE_SONNET4_MODEL || 'claude-opus-4-6' }}
          CLAUDE_SONNET6_MODEL: ${{ vars.FUGUE_CLAUDE_SONNET6_MODEL || 'claude-opus-4-6' }}
          GEMINI_MODEL: ${{ vars.FUGUE_GEMINI_MODEL || 'gemini-2.5-pro' }}
          XAI_MODEL_LATEST: ${{ vars.FUGUE_XAI_MODEL || 'grok-4' }}
          GEMINI_FALLBACK_MODEL: ${{ vars.FUGUE_GEMINI_FALLBACK_MODEL || 'gemini-2.5-flash' }}
          RISK_TIER: ${{ needs.prepare.outputs.risk_tier }}
          VOTE_COMMAND_INPUT: "true"
          COUNCIL_STAGE: "final"
          COUNCIL_RUN_DIR: ".fugue/kernel-council/final"
          COUNCIL_EXECUTION_PROFILE: "subscription-strict"
          COUNCIL_FORCE_COPILOT_CONTINUITY: "true"
          COUNCIL_FORCE_MISSING_PROVIDER: ${{ inputs.council_force_missing_provider || 'none' }}
          COUNCIL_MULTI_AGENT_MODE: "standard"
          COUNCIL_GLM_SUBAGENT_MODE: "off"
          CLAUDE_ASSIST_EXECUTION_POLICY: "hybrid"
          STRICT_OPUS_ASSIST_DIRECT: "false"
          COUNCIL_EXTRA_CONTEXT: |
            Final implementation review before commit/PR.
            Branch: ${{ needs.prepare.outputs.branch_name }}
            Diff stat:
            ${{ steps.diff_summary.outputs.diff_stat }}
            Changed files:
            ${{ steps.diff_summary.outputs.changed_files }}
        run: bash .fugue-orchestrator/scripts/harness/run-kernel-council-review.sh

      - name: Commit changes
        if: ${{ steps.codex.outputs.no_changes != 'true' && steps.codex.outputs.exit_code == '0' }}
        run: |
          git config user.name "fugue-codex[bot]"
          git config user.email "fugue-codex[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement issue #${{ needs.prepare.outputs.issue_number }}

          Generated by Codex CLI (${{ inputs.codex_model }}) via FUGUE GHA24.

          Closes #${{ needs.prepare.outputs.issue_number }}"

      - name: Push branch
        if: ${{ steps.codex.outputs.no_changes != 'true' && steps.codex.outputs.exit_code == '0' }}
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_PAT || github.token }}
        run: |
          git push origin "${{ needs.prepare.outputs.branch_name }}"

      - name: Create Pull Request
        id: create-pr
        if: ${{ steps.codex.outputs.no_changes != 'true' && steps.codex.outputs.exit_code == '0' }}
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_PAT || github.token }}
        run: |
          set -euo pipefail

          TARGET_REPO="${{ needs.prepare.outputs.target_repo }}"
          ISSUE_NUM="${{ needs.prepare.outputs.issue_number }}"

          PR_URL="$(gh pr create \
            --repo "${TARGET_REPO}" \
            --base "${{ inputs.target_branch }}" \
            --head "${{ needs.prepare.outputs.branch_name }}" \
            --title "feat: implement #${ISSUE_NUM} (Codex)" \
            --body "## Auto-generated by FUGUE Codex Implement

          **Source issue**: #${ISSUE_NUM}
          **Model**: ${{ inputs.codex_model }}
          **Mode**: full-auto

          ### Changes
          $(git log --oneline -1)

          ### Review checklist
          - [ ] Code compiles
          - [ ] Tests pass
          - [ ] No unintended file changes
          - [ ] Security review (no secrets leaked)

          ---
          Generated by [FUGUE GHA24](https://github.com/${GITHUB_REPOSITORY})")"

          echo "pr_url=${PR_URL}" >> "${GITHUB_OUTPUT}"

      - name: Upload Codex log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-output-log
          path: |
            /tmp/codex-output.log
            ${{ steps.preflight_parallel.outputs.parallel_preflight_log_dir }}
            ${{ steps.codex.outputs.preflight_report_path }}
            ${{ steps.codex.outputs.implementation_report_path }}
            ${{ steps.codex.outputs.todo_report_path }}
            ${{ steps.codex.outputs.lessons_report_path }}
            ${{ steps.codex.outputs.research_report_path }}
            ${{ steps.codex.outputs.plan_report_path }}
            ${{ steps.codex.outputs.critic_report_path }}
            ${{ steps.kernel_preflight_council.outputs.council_run_dir }}
            ${{ steps.kernel_final_council.outputs.council_run_dir }}
            ${{ needs.workspace-preflight.outputs.workspace_report_path }}
            ${{ needs.freee-preflight.outputs.freee_report_path }}
            .fugue/pre-implement/googleworkspace-run
          if-no-files-found: ignore

  finalize:
    if: always() && needs.prepare.outputs.should_run == 'true' && needs.credential-guard.outputs.can_run == 'true'
    needs: [prepare, credential-guard, workspace-preflight, freee-preflight, implement]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Update issue with results
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          PR_URL: ${{ needs.implement.outputs.pr_url }}
          CODEX_EXIT: ${{ needs.implement.outputs.codex_exit }}
          WORKSPACE_PREFLIGHT_STATUS: ${{ needs.workspace-preflight.outputs.workspace_preflight_status }}
          FREEE_PREFLIGHT_STATUS: ${{ needs.freee-preflight.outputs.freee_preflight_status }}
        run: |
          set -euo pipefail

          gh issue edit "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" \
            --remove-label "processing" || true

          workspace_note=""
          if [[ -n "${WORKSPACE_PREFLIGHT_STATUS}" ]]; then
            workspace_note="

          Workspace preflight: ${WORKSPACE_PREFLIGHT_STATUS}"
          fi

          freee_note=""
          if [[ -n "${FREEE_PREFLIGHT_STATUS}" ]]; then
            freee_note="

          freee preflight: ${FREEE_PREFLIGHT_STATUS}"
          fi

          if [[ -n "${PR_URL}" ]]; then
            gh issue comment "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" \
              --body "Codex implementation complete. PR created: ${PR_URL}

          Exit code: ${CODEX_EXIT}${workspace_note}${freee_note}"
            gh issue edit "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" \
              --add-label "completed"
          elif [[ "${CODEX_EXIT}" != "0" ]]; then
            gh issue comment "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" \
              --body "Codex implementation stopped before PR creation because mandatory protocol checks failed.

          Exit code: ${CODEX_EXIT}${workspace_note}${freee_note}
          Check artifacts for protocol reports and codex output log."
            gh issue edit "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" \
              --add-label "needs-review"
          else
            gh issue comment "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" \
              --body "Codex implementation did not produce changes.

          Exit code: ${CODEX_EXIT}${workspace_note}${freee_note}
          This may mean: no code changes were needed, the task was unclear, or Codex encountered an error.

          Check the workflow run artifacts for the full Codex output log."
            gh issue edit "${ISSUE_NUMBER}" --repo "${GITHUB_REPOSITORY}" \
              --add-label "needs-review"
          fi
