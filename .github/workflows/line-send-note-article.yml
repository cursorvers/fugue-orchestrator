name: LINE Send Note Article

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

concurrency:
  group: line-send-note-article
  cancel-in-progress: false

jobs:
  send-article:
    runs-on: ubuntu-latest
