name: Google Workspace Feed Sync

on:
  schedule:
    - cron: "0 21 * * 0-4"
    - cron: "15 21 * * 0"
  workflow_dispatch:
    inputs:
      profile:
        description: "Feed profile to sync (`all` or a profile id)"
        required: false
        type: string
        default: "all"
      workspace_readonly_environment:
        description: "Protected GitHub Environment used for readonly Google Workspace feed sync"
        required: false
        type: string
        default: "workspace-readonly"
      force_refresh:
        description: "Bypass TTL cache and refresh the selected feeds"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  resolve-profiles:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      environment_name: ${{ steps.matrix.outputs.environment_name }}
      force_refresh: ${{ steps.matrix.outputs.force_refresh }}
    steps:
      - name: Resolve feed profile matrix
        id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE_EXPR: ${{ github.event.schedule }}
          INPUT_PROFILE: ${{ inputs.profile }}
          INPUT_ENVIRONMENT: ${{ inputs.workspace_readonly_environment }}
          INPUT_FORCE_REFRESH: ${{ inputs.force_refresh }}
        run: |
          set -euo pipefail

          profile="${INPUT_PROFILE:-all}"
          matrix='["morning-brief","weekly-digest"]'
          force_refresh="false"

          if [[ "${EVENT_NAME}" == "schedule" ]]; then
            case "${SCHEDULE_EXPR}" in
              "0 21 * * 0-4")
                matrix='["morning-brief"]'
                ;;
              "15 21 * * 0")
                matrix='["weekly-digest"]'
                ;;
            esac
          else
            case "${profile}" in
              ""|"all")
                matrix='["morning-brief","pre-meeting-scan","daily-mailbox-digest","weekly-digest"]'
                ;;
              *)
                matrix="[\"${profile}\"]"
                ;;
            esac
            if [[ "${INPUT_FORCE_REFRESH:-false}" == "true" ]]; then
              force_refresh="true"
            fi
          fi

          {
            echo "matrix=${matrix}"
            echo "environment_name=${INPUT_ENVIRONMENT:-workspace-readonly}"
            echo "force_refresh=${force_refresh}"
          } >> "${GITHUB_OUTPUT}"

  sync:
    needs: [resolve-profiles]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJson(needs.resolve-profiles.outputs.matrix) }}
    environment:
      name: ${{ needs.resolve-profiles.outputs.environment_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Google Workspace CLI
        run: npm install -g @googleworkspace/cli

      - name: Run feed sync
        id: feed
        env:
          FEED_PROFILE: ${{ matrix.profile }}
          FORCE_REFRESH: ${{ needs.resolve-profiles.outputs.force_refresh }}
          GOOGLEWORKSPACE_FEED_POLICY_FILE: config/integrations/googleworkspace-feed-policy.json
          OUT_ROOT: .fugue/feeds/googleworkspace
          PREFLIGHT_SCRIPT: scripts/harness/googleworkspace-preflight-enrich.sh
          ADAPTER: scripts/lib/googleworkspace-cli-adapter.sh
          GOOGLE_WORKSPACE_CLI_CREDENTIALS_JSON: ${{ secrets.GOOGLE_WORKSPACE_CLI_CREDENTIALS_JSON }}
          GOOGLE_WORKSPACE_USER_CREDENTIALS_JSON: ${{ secrets.GOOGLE_WORKSPACE_USER_CREDENTIALS_JSON }}
        run: bash scripts/harness/googleworkspace-scheduled-extract.sh

      - name: Upload feed artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: googleworkspace-feed-${{ matrix.profile }}
          path: |
            .fugue/feeds/googleworkspace/${{ matrix.profile }}/latest.json
            .fugue/feeds/googleworkspace/${{ matrix.profile }}
          if-no-files-found: ignore
