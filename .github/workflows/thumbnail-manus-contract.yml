name: thumbnail-manus-contract

on:
  push:
    branches:
      - canon-v4-e2e-test
    paths:
      - '.github/workflows/thumbnail-manus-contract.yml'
      - 'claude-config/assets/skills/thumbnail-gen/**'
      - 'claude-config/assets/skills/note-generate/**'
      - 'claude-config/assets/skills/slide/scripts/manus-api-client.js'
      - 'tests/test-thumbnail-gen-contract.sh'
  workflow_dispatch:

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run thumbnail Manus contract tests
        run: bash tests/test-thumbnail-gen-contract.sh
