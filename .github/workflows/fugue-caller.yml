name: fugue-caller

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: string
      execution_mode_override:
        description: "Execution policy override (auto|primary|backup-safe)"
        required: false
        type: string
        default: "auto"

permissions:
  issues: write
  contents: read
  actions: write

jobs:
  route:
    if: ${{ github.event_name != 'issue_comment' || github.actor != 'github-actions[bot]' }}
    uses: ./.github/workflows/fugue-task-router.yml
    with:
      issue_number: ${{ github.event.issue.number || github.event.inputs.issue_number }}
      trigger_event_name: ${{ github.event_name }}
      trigger_label_name: ${{ github.event.label.name || '' }}
      comment_body: ${{ github.event.comment.body || '' }}
      comment_author: ${{ github.event.comment.user.login || '' }}
      trust_subject: ${{ github.event_name == 'issue_comment' && github.event.comment.user.login || github.actor }}
      execution_mode_override: ${{ github.event.inputs.execution_mode_override || 'auto' }}
    secrets: inherit
