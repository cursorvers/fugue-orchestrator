name: Deploy Sops-Encrypted Secrets

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - validate
          - github-org
          - github-repo
      dry_run:
        description: 'Dry run (show keys, skip write)'
        type: boolean
        default: true
      repo:
        description: 'Target repo (for github-repo target)'
        required: false
        type: string
        default: ''
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read

jobs:
  deploy-secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ENC_FILE: secrets/fugue-secrets.enc

    steps:
      - uses: actions/checkout@v6

      - name: Install sops
        run: |
          SOPS_VERSION=$(curl -s https://api.github.com/repos/getsops/sops/releases/latest | grep -oP '"tag_name": "\Kv[^"]+')
          curl -sL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" -o /tmp/sops
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops
          sops --version

      - name: Setup age key
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age-key.txt
        run: |
          mkdir -p "$(dirname "$SOPS_AGE_KEY_FILE")"
          echo "${{ secrets.SOPS_AGE_PRIVATE_KEY }}" > "$SOPS_AGE_KEY_FILE"
          chmod 600 "$SOPS_AGE_KEY_FILE"

      - name: Decrypt & validate
        id: decrypt
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age-key.txt
        run: |
          sops decrypt --input-type dotenv --output-type dotenv "$ENC_FILE" > "${{ runner.temp }}/decrypted.env"
          chmod 600 "${{ runner.temp }}/decrypted.env"
          KEY_COUNT=$(grep -c '^[A-Z_]' "${{ runner.temp }}/decrypted.env" || echo 0)
          echo "key_count=${KEY_COUNT}" >> "$GITHUB_OUTPUT"
          echo "Decrypted ${KEY_COUNT} secrets"

      - name: Deploy to GitHub Org Secrets
        if: inputs.target == 'github-org' && inputs.dry_run == false
        env:
          GH_TOKEN: ${{ secrets.FUGUE_OPS_PAT }}
        run: |
          while IFS='=' read -r key value; do
            [[ "$key" =~ ^[A-Z_] ]] || continue
            echo "Setting org secret: $key"
            echo "$value" | gh secret set "$key" --org cursorvers
          done < "${{ runner.temp }}/decrypted.env"

      - name: Deploy to GitHub Repo Secrets
        if: inputs.target == 'github-repo' && inputs.dry_run == false && inputs.repo != ''
        env:
          GH_TOKEN: ${{ secrets.FUGUE_OPS_PAT }}
        run: |
          while IFS='=' read -r key value; do
            [[ "$key" =~ ^[A-Z_] ]] || continue
            echo "Setting repo secret: $key → ${{ inputs.repo }}"
            echo "$value" | gh secret set "$key" -R "cursorvers/${{ inputs.repo }}"
          done < "${{ runner.temp }}/decrypted.env"

      - name: Dry run output
        if: inputs.dry_run == true || inputs.target == 'validate'
        run: |
          echo "=== Dry Run: Keys in encrypted file ==="
          grep '^[A-Z_]' "${{ runner.temp }}/decrypted.env" | cut -d= -f1 | sort
          echo "=== Total: ${{ steps.decrypt.outputs.key_count }} keys ==="

      - name: Cleanup
        if: always()
        env:
          SOPS_AGE_KEY_FILE: ${{ runner.temp }}/age-key.txt
        run: rm -f "${{ runner.temp }}/decrypted.env" "$SOPS_AGE_KEY_FILE"

      - name: Summary
        if: always()
        run: |
          echo "## Sops Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Target:** ${{ inputs.target || 'validate (scheduled)' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Dry run:** ${{ inputs.dry_run || 'true' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Keys:** ${{ steps.decrypt.outputs.key_count }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
