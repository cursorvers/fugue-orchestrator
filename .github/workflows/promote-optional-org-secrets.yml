name: Promote Optional Org Secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.ORG_SECRET_MANAGER_PAT }}
      ORG_NAME: cursorvers
      TARGET_REPOS: cursorvers/fugue-orchestrator
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Validate promotion token
        run: |
          set -euo pipefail
          : "${GH_TOKEN:?ORG_SECRET_MANAGER_PAT is required}"

      - name: Promote optional org secrets
        shell: bash
        run: |
          set -euo pipefail

          promote_secret() {
            local name="$1"
            local value="${!name:-}"
            if [[ -z "${value}" ]]; then
              echo "SKIP ${name}: value not set in source repo"
              return 0
            fi

            printf '%s' "${value}" | gh secret set "${name}" \
              --org "${ORG_NAME}" \
              --visibility selected \
              --repos "${TARGET_REPOS}" >/dev/null

            echo "OK ${name}"
          }

          promote_secret ANTHROPIC_API_KEY

      - name: Verify org visibility
        shell: bash
        run: |
          set -euo pipefail
          gh secret list --org "${ORG_NAME}" | grep -E '^ANTHROPIC_API_KEY[[:space:]]'
