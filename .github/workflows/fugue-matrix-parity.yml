name: fugue-matrix-parity

on:
  pull_request:
    paths:
      - '.github/workflows/fugue-tutti-router.yml'
      - '.github/workflows/fugue-matrix-parity.yml'
      - 'scripts/lib/build-agent-matrix.sh'
      - 'scripts/lib/claude-teams-policy.sh'
      - 'scripts/lib/model-policy.sh'
      - 'scripts/harness/generate-tutti-comment.sh'
      - 'scripts/local/run-local-orchestration.sh'
      - 'scripts/local/run-linked-systems.sh'
      - 'scripts/local/integrations/**'
      - 'scripts/sim-orchestrator-switch.sh'
      - 'scripts/check-agent-matrix-parity.sh'
      - 'scripts/check-linked-systems-integrity.sh'
      - 'tests/test-build-agent-matrix-defaults.sh'
      - 'tests/test-claude-teams-policy.sh'
      - 'tests/test-codex-live-defaults.sh'
      - 'tests/test-kernel-diversity-contract.sh'
      - 'tests/test-model-policy.sh'
      - 'config/integrations/local-systems.json'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fugue-tutti-router.yml'
      - '.github/workflows/fugue-matrix-parity.yml'
      - 'scripts/lib/build-agent-matrix.sh'
      - 'scripts/lib/claude-teams-policy.sh'
      - 'scripts/lib/model-policy.sh'
      - 'scripts/harness/generate-tutti-comment.sh'
      - 'scripts/local/run-local-orchestration.sh'
      - 'scripts/local/run-linked-systems.sh'
      - 'scripts/local/integrations/**'
      - 'scripts/sim-orchestrator-switch.sh'
      - 'scripts/check-agent-matrix-parity.sh'
      - 'scripts/check-linked-systems-integrity.sh'
      - 'tests/test-build-agent-matrix-defaults.sh'
      - 'tests/test-claude-teams-policy.sh'
      - 'tests/test-codex-live-defaults.sh'
      - 'tests/test-kernel-diversity-contract.sh'
      - 'tests/test-model-policy.sh'
      - 'config/integrations/local-systems.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  matrix-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Shell syntax checks
        run: |
          set -euo pipefail
          bash -n scripts/lib/build-agent-matrix.sh
          bash -n scripts/lib/claude-teams-policy.sh
          bash -n scripts/lib/model-policy.sh
          bash -n scripts/harness/generate-tutti-comment.sh
          bash -n scripts/local/run-local-orchestration.sh
          bash -n scripts/local/run-linked-systems.sh
          bash -n scripts/sim-orchestrator-switch.sh
          bash -n scripts/check-agent-matrix-parity.sh
          bash -n scripts/check-linked-systems-integrity.sh
          bash -n tests/test-build-agent-matrix-defaults.sh
          bash -n tests/test-claude-teams-policy.sh
          bash -n tests/test-codex-live-defaults.sh
          bash -n tests/test-kernel-diversity-contract.sh
          bash -n tests/test-model-policy.sh

      - name: Matrix parity check
        run: |
          set -euo pipefail
          chmod +x scripts/lib/build-agent-matrix.sh scripts/check-agent-matrix-parity.sh scripts/check-linked-systems-integrity.sh tests/test-build-agent-matrix-defaults.sh tests/test-claude-teams-policy.sh tests/test-codex-live-defaults.sh tests/test-kernel-diversity-contract.sh tests/test-model-policy.sh
          ./tests/test-build-agent-matrix-defaults.sh
          ./tests/test-claude-teams-policy.sh
          ./tests/test-codex-live-defaults.sh
          ./tests/test-kernel-diversity-contract.sh
          ./tests/test-model-policy.sh
          ./scripts/check-agent-matrix-parity.sh
          ./scripts/check-linked-systems-integrity.sh
