name: x-auto-note-linking-rule

on:
  pull_request:
    paths:
      - '.github/workflows/x-auto-note-linking-rule.yml'
      - 'docs/agents/x-auto-contract.md'
      - 'docs/x-auto-note-linking-rule.md'
      - 'docs/ADR-005-x-article-defer-note-consolidation.md'
      - 'skills/x-auto-post-guard/SKILL.md'
      - 'skills/x-auto-thumbnail-art-director/SKILL.md'
      - 'scripts/eval/x-auto-health.sh'
      - 'scripts/eval/x-auto-health.py'
      - 'tests/test-x-auto-note-linking-rule.sh'
      - 'tests/test-x-auto-skill-contract.sh'
      - 'tests/test-x-auto-health-contract.sh'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/x-auto-note-linking-rule.yml'
      - 'docs/agents/x-auto-contract.md'
      - 'docs/x-auto-note-linking-rule.md'
      - 'docs/ADR-005-x-article-defer-note-consolidation.md'
      - 'skills/x-auto-post-guard/SKILL.md'
      - 'skills/x-auto-thumbnail-art-director/SKILL.md'
      - 'scripts/eval/x-auto-health.sh'
      - 'scripts/eval/x-auto-health.py'
      - 'tests/test-x-auto-note-linking-rule.sh'
      - 'tests/test-x-auto-skill-contract.sh'
      - 'tests/test-x-auto-health-contract.sh'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Shell syntax check
        run: |
          set -euo pipefail
          bash -n tests/test-x-auto-note-linking-rule.sh
          bash -n tests/test-x-auto-skill-contract.sh
          bash -n tests/test-x-auto-health-contract.sh

      - name: Rule check
        run: |
          set -euo pipefail
          bash tests/test-x-auto-note-linking-rule.sh
          bash tests/test-x-auto-skill-contract.sh
          bash tests/test-x-auto-health-contract.sh
