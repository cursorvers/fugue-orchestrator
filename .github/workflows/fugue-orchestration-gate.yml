      run_canary_lite:
        description: "Also run blocking canary-lite (dispatches canary workflow in lite mode)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  actions: write

jobs:
  fast-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ALLOW_MISSING_GLOBAL_PROMPTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Shell syntax checks
        run: |
          set -euo pipefail
          bash -n scripts/lib/build-agent-matrix.sh
          bash -n scripts/lib/execution-profile-policy.sh
          bash -n scripts/lib/orchestrator-policy.sh
          bash -n scripts/lib/provider-diff-audit.sh
          bash -n scripts/local/run-local-orchestration.sh
          bash -n scripts/local/run-linked-systems.sh
          bash -n scripts/sim-orchestrator-switch.sh
          bash -n scripts/lib/watchdog-alert-policy.sh
          bash -n scripts/lib/watchdog-alert-delivery-policy.sh
          bash -n scripts/lib/watchdog-reconcile-claim-policy.sh
          bash -n scripts/lib/workspace-root-policy.sh
          bash -n scripts/local/integrations/line-notify.sh
          bash -n scripts/harness/run-recovery-console.sh
          bash -n scripts/harness/run-kernel-council-review.sh
          bash -n scripts/check-agent-matrix-parity.sh
          bash -n scripts/check-linked-systems-integrity.sh
          bash -n scripts/check-policy-layering.sh
          bash -n scripts/check-codex-kernel-prompt.sh
          bash -n scripts/check-codex-vote-prompt.sh
          bash -n scripts/check-kernel-vote-readiness.sh
          bash -n scripts/refresh-philosophy-delta.sh
          bash -n scripts/promote-philosophy-delta.sh
          bash -n scripts/check-notebooklm-runtime-readiness.sh
          bash -n tests/test-philosophy-worldview-smoke.sh
          bash -n tests/test-check-philosophy-worldview-smoke.sh
          bash -n tests/test-check-philosophy-refresh.sh
          bash -n tests/test-check-policy-layering.sh
          bash -n tests/test-check-kernel-vote-readiness.sh
          bash -n tests/test-check-notebooklm-runtime-readiness.sh
          bash -n tests/test-codex-vote-prompt.sh
          bash -n tests/test-kernel-sequencing-policy.sh
          bash -n tests/test-kernel-council-review.sh
          bash -n tests/test-recovery-pass-live.sh
          bash -n tests/test-aggregate-tutti-votes.sh
          bash -n tests/test-vote-command-implement-guard.sh
          bash -n tests/test-vote-handoff-simulation.sh
          bash -n tests/test-publish-decision-journal.sh
          bash -n tests/test-local-orchestration-heartbeat-cleanup.sh
          bash -n tests/test-task-router-start-signal.sh
          bash -n tests/test-parallel-floor-policy.sh
          bash -n tests/test-provider-diff-audit.sh
          bash -n tests/test-recovery-reroute-claim-gate.sh
          bash -n tests/test-watchdog-reconcile-claim-policy.sh
          bash -n tests/test-watchdog-reconcile-workflow.sh
          bash -n tests/test-discord-notify-policy.sh
          bash -n tests/test-line-notify-policy.sh
          bash -n tests/test-watchdog-alert-routing.sh
          bash -n tests/test-workspace-root-policy.sh

      - name: Kernel prompt static contract
        run: |
          set -euo pipefail
          jq -e '.prompt_home == "~/.codex/prompts"' docs/codex-prompt-ssot-manifest.json >/dev/null
          jq -e '.resolution.canonical_orchestrator_prompts == ["kernel","k","vote","v"]' docs/codex-prompt-ssot-manifest.json >/dev/null
          bash scripts/check-codex-kernel-prompt.sh

      - name: Vote prompt static contract
        run: |
          set -euo pipefail
          bash tests/test-check-policy-layering.sh
          bash scripts/check-policy-layering.sh
          bash tests/test-codex-vote-prompt.sh
          bash tests/test-kernel-sequencing-policy.sh
          bash tests/test-kernel-council-review.sh
          bash tests/test-recovery-pass-live.sh
          bash tests/test-check-kernel-vote-readiness.sh
          bash tests/test-check-notebooklm-runtime-readiness.sh
          bash tests/test-aggregate-tutti-votes.sh
          bash tests/test-vote-command-implement-guard.sh
          bash tests/test-vote-handoff-simulation.sh

      - name: Kernel vote readiness gate
        run: |
          set -euo pipefail
          KERNEL_VOTE_READINESS_LIVE_SMOKE_MODE=off bash scripts/check-kernel-vote-readiness.sh
          NOTEBOOKLM_READINESS_SKIP_REPO_TESTS=true NOTEBOOKLM_READINESS_LIVE_SMOKE_MODE=off bash scripts/check-notebooklm-runtime-readiness.sh

      - name: Philosophy Worldview Smoke Static Contract
        run: |
          set -euo pipefail
          bash tests/test-check-philosophy-worldview-smoke.sh

      - name: Philosophy Refresh Static Contract
        run: |
          set -euo pipefail
          bash tests/test-check-philosophy-refresh.sh

      - name: Local orchestration boundary tests
        run: |
          set -euo pipefail
          bash tests/test-linked-systems-comment-policy.sh
          bash tests/test-linked-systems-comment-opt-in.sh
          bash tests/test-linked-systems-exit-contract.sh
          bash tests/test-linked-systems-dispatch-contract.sh
          bash tests/test-fugue-result-receiver-template.sh
          bash tests/test-check-kernel-task-completion-backup-agent.sh
          bash tests/test-kernel-task-completion-backup.sh
          bash tests/test-route-task-handoff.sh
          bash tests/test-resolve-orchestration-context.sh
          bash tests/test-notebooklm-runtime-smoke.sh
          bash tests/test-watchdog-alert-policy.sh
          bash tests/test-watchdog-alert-delivery-policy.sh
          bash tests/test-discord-notify-policy.sh
          bash tests/test-line-notify-policy.sh
          bash tests/test-watchdog-alert-routing.sh
          bash tests/test-primary-heartbeat-state.sh
          bash tests/test-publish-decision-journal.sh
          bash tests/test-local-orchestration-heartbeat-cleanup.sh
          bash tests/test-task-router-start-signal.sh
          bash tests/test-parallel-floor-policy.sh
          bash tests/test-provider-diff-audit.sh
          bash tests/test-recovery-reroute-claim-gate.sh
          bash tests/test-watchdog-reconcile-claim-policy.sh
          bash tests/test-watchdog-reconcile-workflow.sh
          bash tests/test-workspace-root-policy.sh

      - name: Workflow YAML parse checks
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import yaml
          files = [
              ".github/workflows/fugue-orchestrator-canary.yml",
              ".github/workflows/fugue-orchestration-gate.yml",
              ".github/workflows/fugue-watchdog.yml",
              ".github/workflows/fugue-tutti-caller.yml",
              ".github/workflows/fugue-tutti-router.yml",
              ".github/workflows/fugue-task-router.yml",
              ".github/workflows/kernel-decision-journal.yml",
          ]
          for p in files:
              with open(p, "r", encoding="utf-8") as f:
                  yaml.safe_load(f)
          print("workflow-yaml-parse-ok")
          PY

      - name: Matrix parity checks
        run: |
          set -euo pipefail
          chmod +x scripts/lib/build-agent-matrix.sh scripts/check-agent-matrix-parity.sh scripts/check-linked-systems-integrity.sh
          ./scripts/check-agent-matrix-parity.sh
          ./scripts/check-linked-systems-integrity.sh

      - name: Deterministic switch simulation
        run: |
          set -euo pipefail
          sim_out="$(mktemp)"
          ./scripts/sim-orchestrator-switch.sh > "${sim_out}"
          rows="$(( $(wc -l < "${sim_out}") - 1 ))"
          if (( rows < 10 )); then
            echo "Expected at least 10 scenario rows from sim-orchestrator-switch, got ${rows}" >&2
            cat "${sim_out}" >&2
            exit 1
          fi
          echo "sim-orchestrator-switch rows=${rows}"

  canary-lite:
    needs: [fast-gate]
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_canary_lite) }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Trigger canary lite
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          start_iso="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          gh workflow run fugue-orchestrator-canary.yml \
            --repo "${repo}" \
            --ref main \
            -f canary_mode=lite

          target_sha=""
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            target_sha="${GITHUB_SHA}"
          fi

          run_id=""
          for _ in $(seq 1 30); do
            runs_json="$(gh run list --repo "${repo}" --workflow fugue-orchestrator-canary.yml --event workflow_dispatch --limit 20 --json databaseId,createdAt,headSha)"
            if [[ -n "${target_sha}" ]]; then
              run_id="$(echo "${runs_json}" | jq -r --arg start "${start_iso}" --arg sha "${target_sha}" '[.[] | select(.createdAt >= $start and .headSha == $sha)][0].databaseId // empty')"
            fi
            if [[ -z "${run_id}" ]]; then
              run_id="$(echo "${runs_json}" | jq -r --arg start "${start_iso}" '[.[] | select(.createdAt >= $start)][0].databaseId // empty')"
            fi
            if [[ -n "${run_id}" ]]; then
              break
            fi
            sleep 3
          done

          if [[ -z "${run_id}" ]]; then
            echo "Failed to locate dispatched canary-lite run id." >&2
            exit 1
          fi

          echo "Watching canary-lite run ${run_id}"
          gh run watch "${run_id}" --repo "${repo}" --exit-status
          gh run view "${run_id}" --repo "${repo}" --json status,conclusion,url,createdAt,updatedAt
