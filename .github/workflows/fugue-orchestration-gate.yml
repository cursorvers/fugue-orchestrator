name: fugue-orchestration-gate

on:
  pull_request:
    paths:
      - '.github/workflows/fugue-orchestration-gate.yml'
      - '.github/workflows/fugue-orchestrator-canary.yml'
      - '.github/workflows/fugue-tutti-caller.yml'
      - '.github/workflows/fugue-tutti-router.yml'
      - '.github/workflows/fugue-task-router.yml'
      - 'scripts/lib/build-agent-matrix.sh'
      - 'scripts/lib/claude-teams-policy.sh'
      - 'scripts/lib/execution-profile-policy.sh'
      - 'scripts/lib/model-policy.sh'
      - 'scripts/lib/orchestrator-policy.sh'
      - 'scripts/harness/aggregate-tutti-votes.sh'
      - 'scripts/harness/ci-agent-runner.sh'
      - 'scripts/harness/generate-tutti-comment.sh'
      - 'scripts/harness/resolve-orchestration-context.sh'
      - 'scripts/harness/subscription-agent-runner.sh'
      - 'scripts/check-agent-matrix-parity.sh'
      - 'scripts/check-policy-layering.sh'
      - 'scripts/check-codex-kernel-prompt.sh'
      - 'scripts/check-linked-systems-integrity.sh'
      - 'scripts/check-codex-vote-prompt.sh'
      - 'scripts/sim-orchestrator-switch.sh'
      - 'scripts/local/run-local-orchestration.sh'
      - 'scripts/local/run-linked-systems.sh'
      - 'tests/test-build-agent-matrix-defaults.sh'
      - 'tests/test-claude-teams-policy.sh'
      - 'tests/test-check-policy-layering.sh'
      - 'tests/test-codex-kernel-prompt.sh'
      - 'tests/test-codex-live-defaults.sh'
      - 'tests/test-codex-vote-prompt.sh'
      - 'tests/test-kernel-diversity-contract.sh'
      - 'tests/test-model-policy.sh'
      - 'tests/test-resolve-orchestration-context.sh'
      - 'docs/codex-prompt-ssot-manifest.json'
      - 'AGENTS.md'
      - 'CODEX.md'
      - 'README.md'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fugue-orchestration-gate.yml'
      - '.github/workflows/fugue-orchestrator-canary.yml'
      - '.github/workflows/fugue-tutti-caller.yml'
      - '.github/workflows/fugue-tutti-router.yml'
      - '.github/workflows/fugue-task-router.yml'
      - 'scripts/lib/build-agent-matrix.sh'
      - 'scripts/lib/claude-teams-policy.sh'
      - 'scripts/lib/execution-profile-policy.sh'
      - 'scripts/lib/model-policy.sh'
      - 'scripts/lib/orchestrator-policy.sh'
      - 'scripts/harness/aggregate-tutti-votes.sh'
      - 'scripts/harness/ci-agent-runner.sh'
      - 'scripts/harness/generate-tutti-comment.sh'
      - 'scripts/harness/resolve-orchestration-context.sh'
      - 'scripts/harness/subscription-agent-runner.sh'
      - 'scripts/check-agent-matrix-parity.sh'
      - 'scripts/check-policy-layering.sh'
      - 'scripts/check-codex-kernel-prompt.sh'
      - 'scripts/check-linked-systems-integrity.sh'
      - 'scripts/check-codex-vote-prompt.sh'
      - 'scripts/sim-orchestrator-switch.sh'
      - 'scripts/local/run-local-orchestration.sh'
      - 'scripts/local/run-linked-systems.sh'
      - 'tests/test-build-agent-matrix-defaults.sh'
      - 'tests/test-claude-teams-policy.sh'
      - 'tests/test-check-policy-layering.sh'
      - 'tests/test-codex-kernel-prompt.sh'
      - 'tests/test-codex-live-defaults.sh'
      - 'tests/test-codex-vote-prompt.sh'
      - 'tests/test-kernel-diversity-contract.sh'
      - 'tests/test-model-policy.sh'
      - 'tests/test-resolve-orchestration-context.sh'
      - 'docs/codex-prompt-ssot-manifest.json'
      - 'AGENTS.md'
      - 'CODEX.md'
      - 'README.md'
  workflow_dispatch:
    inputs:
      run_canary_lite:
        description: "Also run blocking canary-lite (dispatches canary workflow in lite mode)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  actions: write

jobs:
  fast-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ALLOW_MISSING_GLOBAL_PROMPTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Shell syntax checks
        run: |
          set -euo pipefail
          bash -n scripts/lib/build-agent-matrix.sh
          bash -n scripts/lib/claude-teams-policy.sh
          bash -n scripts/lib/execution-profile-policy.sh
          bash -n scripts/lib/model-policy.sh
          bash -n scripts/lib/orchestrator-policy.sh
          bash -n scripts/harness/aggregate-tutti-votes.sh
          bash -n scripts/harness/ci-agent-runner.sh
          bash -n scripts/harness/generate-tutti-comment.sh
          bash -n scripts/harness/resolve-orchestration-context.sh
          bash -n scripts/harness/subscription-agent-runner.sh
          bash -n scripts/local/run-local-orchestration.sh
          bash -n scripts/local/run-linked-systems.sh
          bash -n scripts/sim-orchestrator-switch.sh
          bash -n scripts/check-agent-matrix-parity.sh
          bash -n scripts/check-policy-layering.sh
          bash -n scripts/check-codex-kernel-prompt.sh
          bash -n scripts/check-linked-systems-integrity.sh
          bash -n scripts/check-codex-vote-prompt.sh
          bash -n tests/test-build-agent-matrix-defaults.sh
          bash -n tests/test-claude-teams-policy.sh
          bash -n tests/test-check-policy-layering.sh
          bash -n tests/test-codex-live-defaults.sh
          bash -n tests/test-codex-vote-prompt.sh
          bash -n tests/test-kernel-diversity-contract.sh
          bash -n tests/test-model-policy.sh
          bash -n tests/test-resolve-orchestration-context.sh
          python3 -m json.tool docs/codex-prompt-ssot-manifest.json >/dev/null

      - name: Vote prompt static contract
        run: |
          set -euo pipefail
          bash tests/test-check-policy-layering.sh
          bash scripts/check-policy-layering.sh
          bash tests/test-codex-kernel-prompt.sh
          bash tests/test-codex-vote-prompt.sh

      - name: Workflow YAML parse checks
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import yaml
          files = [
              ".github/workflows/fugue-orchestrator-canary.yml",
              ".github/workflows/fugue-orchestration-gate.yml",
              ".github/workflows/fugue-tutti-caller.yml",
              ".github/workflows/fugue-tutti-router.yml",
              ".github/workflows/fugue-task-router.yml",
          ]
          for p in files:
              with open(p, "r", encoding="utf-8") as f:
                  yaml.safe_load(f)
          print("workflow-yaml-parse-ok")
          PY

      - name: Matrix parity checks
        run: |
          set -euo pipefail
          chmod +x scripts/lib/build-agent-matrix.sh scripts/check-agent-matrix-parity.sh scripts/check-linked-systems-integrity.sh tests/test-build-agent-matrix-defaults.sh tests/test-claude-teams-policy.sh tests/test-codex-live-defaults.sh tests/test-kernel-diversity-contract.sh tests/test-model-policy.sh tests/test-resolve-orchestration-context.sh
          ./tests/test-build-agent-matrix-defaults.sh
          ./tests/test-claude-teams-policy.sh
          ./tests/test-codex-live-defaults.sh
          ./tests/test-kernel-diversity-contract.sh
          ./tests/test-model-policy.sh
          ./tests/test-resolve-orchestration-context.sh
          ./scripts/check-agent-matrix-parity.sh
          ./scripts/check-linked-systems-integrity.sh

      - name: Deterministic switch simulation
        run: |
          set -euo pipefail
          sim_out="$(mktemp)"
          ./scripts/sim-orchestrator-switch.sh > "${sim_out}"
          rows="$(( $(wc -l < "${sim_out}") - 1 ))"
          if (( rows < 10 )); then
            echo "Expected at least 10 scenario rows from sim-orchestrator-switch, got ${rows}" >&2
            cat "${sim_out}" >&2
            exit 1
          fi
          echo "sim-orchestrator-switch rows=${rows}"

      - name: Append fast gate summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Fast Gate Summary"
            echo
            echo "- workflow: \`fugue-orchestration-gate\`"
            echo "- event: \`${GITHUB_EVENT_NAME}\`"
            echo "- ref: \`${GITHUB_REF_NAME:-unknown}\`"
            echo "- sha: \`${GITHUB_SHA}\`"
            echo "- static checks: completed"
            echo "- canary-lite scheduled: \`${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_canary_lite) }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

  canary-lite:
    needs: [fast-gate]
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.run_canary_lite) }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Trigger canary lite
        id: canary_lite
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          start_iso="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          trust_subject="${GITHUB_TRIGGERING_ACTOR:-${GITHUB_ACTOR:-}}"
          canary_ref="main"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && -n "${GITHUB_REF_NAME:-}" ]]; then
            canary_ref="${GITHUB_REF_NAME}"
          fi

          gh workflow run fugue-orchestrator-canary.yml \
            --repo "${repo}" \
            --ref "${canary_ref}" \
            -f canary_mode=lite \
            -f trust_subject="${trust_subject}"

          target_sha=""
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            target_sha="${GITHUB_SHA}"
          fi

          run_id=""
          for _ in $(seq 1 30); do
            runs_json="$(gh run list --repo "${repo}" --workflow fugue-orchestrator-canary.yml --event workflow_dispatch --limit 20 --json databaseId,createdAt,headSha)"
            if [[ -n "${target_sha}" ]]; then
              run_id="$(echo "${runs_json}" | jq -r --arg start "${start_iso}" --arg sha "${target_sha}" '[.[] | select(.createdAt >= $start and .headSha == $sha)][0].databaseId // empty')"
            fi
            if [[ -z "${run_id}" ]]; then
              run_id="$(echo "${runs_json}" | jq -r --arg start "${start_iso}" '[.[] | select(.createdAt >= $start)][0].databaseId // empty')"
            fi
            if [[ -n "${run_id}" ]]; then
              break
            fi
            sleep 3
          done

          if [[ -z "${run_id}" ]]; then
            echo "Failed to locate dispatched canary-lite run id." >&2
            exit 1
          fi

          echo "Watching canary-lite run ${run_id}"
          gh run watch "${run_id}" --repo "${repo}" --exit-status
          run_json="$(gh run view "${run_id}" --repo "${repo}" --json status,conclusion,url,createdAt,updatedAt)"
          echo "${run_json}"

          {
            echo "run_id=${run_id}"
            echo "run_url=$(echo "${run_json}" | jq -r '.url // ""')"
            echo "run_status=$(echo "${run_json}" | jq -r '.status // ""')"
            echo "run_conclusion=$(echo "${run_json}" | jq -r '.conclusion // ""')"
            echo "canary_ref=${canary_ref}"
            echo "trust_subject=${trust_subject}"
          } >> "${GITHUB_OUTPUT}"

      - name: Append gate summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Orchestration Gate Summary"
            echo
            echo "- workflow: \`fugue-orchestration-gate\`"
            echo "- ref: \`${GITHUB_REF_NAME:-unknown}\`"
            echo "- sha: \`${GITHUB_SHA}\`"
            echo "- fast-gate: \`${{ needs.fast-gate.result }}\`"
            echo "- canary-lite enabled: \`true\`"
            echo "- canary-lite ref: \`${{ steps.canary_lite.outputs.canary_ref || 'n/a' }}\`"
            echo "- canary-lite trust subject: \`${{ steps.canary_lite.outputs.trust_subject || 'n/a' }}\`"
            echo "- canary-lite run: ${{ steps.canary_lite.outputs.run_url && format('[{0}]({1})', steps.canary_lite.outputs.run_id, steps.canary_lite.outputs.run_url) || '`n/a`' }}"
            echo "- canary-lite status: \`${{ steps.canary_lite.outputs.run_status || 'n/a' }}\`"
            echo "- canary-lite conclusion: \`${{ steps.canary_lite.outputs.run_conclusion || 'n/a' }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
